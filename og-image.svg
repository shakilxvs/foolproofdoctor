<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#161006"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="900" cy="315" rx="500" ry="400" fill="url(#glow)"/>
  <!-- Grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#c8a96e" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#c8a96e" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="#c8a96e" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#c8a96e" stroke-width="0.5" stroke-opacity="0.1"/>
  <!-- Decorative triangle -->
  <polygon points="1050,80 1180,580 920,580" fill="none" stroke="#c8a96e" stroke-width="0.8" stroke-opacity="0.2"/>
  <!-- Gold accent line -->
  <line x1="80" y1="260" x2="160" y2="260" stroke="#c8a96e" stroke-width="2"/>
  <!-- Eyebrow -->
  <text x="180" y="267" font-family="Georgia, serif" font-size="16" fill="#c8a96e" letter-spacing="6" font-weight="400">LICENSED FINANCIAL PROFESSIONALS</text>
  <!-- Main title -->
  <text x="80" y="360" font-family="Georgia, serif" font-size="72" fill="#f0ece4" font-weight="300" letter-spacing="-1">FoolProof</text>
  <text x="80" y="445" font-family="Georgia, serif" font-size="72" fill="#c8a96e" font-weight="300" font-style="italic" letter-spacing="-1">Doctor</text>
  <!-- Tagline -->
  <text x="80" y="510" font-family="Arial, sans-serif" font-size="18" fill="#f0ece4" fill-opacity="0.45" letter-spacing="2">Become Financially Foolproof</text>
  <!-- Domain -->
  <text x="1120" y="600" font-family="Arial, sans-serif" font-size="14" fill="#c8a96e" fill-opacity="0.5" text-anchor="end" letter-spacing="1">foolproofdoctor.com</text>
</svg>
