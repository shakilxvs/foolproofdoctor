<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — FoolProofDoctor</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<!-- ════════════════════════════════════════════════
     LOGIN SCREEN
     ════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-bg"></div>
  <div class="login-grid"></div>
  <div class="login-card">
    <div class="login-logo">FoolProof<span class="accent">Doctor</span></div>
    <div class="login-subtitle">Admin Panel</div>

    <!-- Error -->
    <div class="login-error" id="loginError"></div>

    <!-- Google -->
    <button class="login-google-btn" id="googleLoginBtn" onclick="handleGoogleLogin()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="login-divider">or sign in with email</div>

    <label class="login-form-label" for="loginEmail">Email</label>
    <input class="login-input" id="loginEmail" type="email"
           placeholder="admin@foolproofdoctor.com" autocomplete="email"
           onkeydown="if(event.key==='Enter')handleEmailLogin()">

    <label class="login-form-label" for="loginPassword">Password</label>
    <input class="login-input" id="loginPassword" type="password"
           placeholder="••••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')handleEmailLogin()">

    <button class="login-btn" id="emailLoginBtn" onclick="handleEmailLogin()">
      Sign In
    </button>

    <div class="login-security">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      Secured by Firebase Authentication
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════
     ADMIN SHELL (shown after login)
     ════════════════════════════════════════════════ -->
<div id="adminShell">

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebarOverlay" style="
    display:none;position:fixed;inset:0;background:rgba(10,10,11,0.7);
    z-index:199;backdrop-filter:blur(2px);" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="adminSidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">FoolProof<span class="accent">Doctor</span></div>
      <div class="sidebar-badge">Admin CMS</div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group">
        <div class="nav-group-label">Overview</div>
        <button class="nav-item active" data-panel="dashboard" onclick="switchPanel('dashboard')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </button>
        <button class="nav-item" data-panel="submissions" onclick="switchPanel('submissions')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Submissions
          <span class="nav-badge submissions-badge" style="display:none;"></span>
        </button>
      </div>

      <div class="nav-group">
        <div class="nav-group-label">Site Content</div>
        <button class="nav-item" data-panel="content" onclick="switchPanel('content')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
          Content Editor
        </button>
        <button class="nav-item" data-panel="services" onclick="switchPanel('services')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          Service Pages
        </button>
        <button class="nav-item" data-panel="branding" onclick="switchPanel('branding')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M4.93 4.93a10 10 0 000 14.14"/></svg>
          Branding & Logo
        </button>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="user-name"  id="userName">Admin</div>
          <div class="user-email" id="userEmail">Loading...</div>
        </div>
      </div>
      <button class="logout-btn" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="admin-main">
    <header class="admin-header">
      <div style="display:flex;align-items:center;gap:16px;">
        <button class="hamburger-admin" onclick="toggleSidebar()">
          <span></span><span></span><span></span>
        </button>
        <h1 class="admin-header-title" id="adminHeaderTitle">Dashboard</h1>
      </div>
      <div class="admin-header-right">
        <button class="header-view-site" onclick="window.open('/','_blank')">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          View Site
        </button>
      </div>
    </header>

    <div class="admin-content">

      <!-- DASHBOARD PANEL -->
      <div class="panel active" id="panel-dashboard"></div>

      <!-- SUBMISSIONS PANEL -->
      <div class="panel" id="panel-submissions">
        <div class="filter-bar" id="submissionsFilterBar"></div>
        <div id="submissionsTableWrap"></div>
      </div>

      <!-- CONTENT PANEL -->
      <div class="panel" id="panel-content"></div>

      <!-- SERVICES PANEL -->
      <div class="panel" id="panel-services"></div>

      <!-- BRANDING PANEL -->
      <div class="panel" id="panel-branding"></div>

    </div><!-- /admin-content -->
  </main>

</div><!-- /adminShell -->

<!-- Save bar -->
<div class="save-bar" id="saveBar">
  <span class="save-bar-text" id="saveBarText"><strong>Unsaved changes</strong></span>
  <div class="save-bar-actions">
    <button class="btn-discard" onclick="handleDiscard()">Discard</button>
    <button class="btn-save-primary" id="saveBarBtn" onclick="triggerActiveSave()">Save Changes</button>
  </div>
</div>

<!-- Submission detail modal -->
<div class="modal-overlay" id="submissionModal" onclick="handleModalOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalName">Submission Detail</div>
      <button class="modal-close" onclick="closeSubmissionModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="modal-grid">
        <div class="modal-field">
          <div class="modal-field-label">Email</div>
          <div class="modal-field-value" id="modalEmail"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Phone</div>
          <div class="modal-field-value" id="modalPhone"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Age</div>
          <div class="modal-field-value" id="modalAge"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Service</div>
          <div class="modal-field-value" id="modalService"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Submitted</div>
          <div class="modal-field-value" id="modalDate"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Last Updated</div>
          <div class="modal-field-value" id="modalStatusUpdated"></div>
        </div>
      </div>
      <div class="modal-field">
        <div class="modal-field-label">Message</div>
        <div class="modal-field-value" id="modalMessage" style="color:var(--muted);font-size:13px;line-height:1.7;"></div>
      </div>
      <div class="modal-field" style="margin-top:20px;">
        <div class="modal-field-label">Status</div>
        <select class="modal-status-select" id="modalStatusSelect"></select>
      </div>
      <div class="modal-field" style="margin-top:14px;">
        <div class="modal-field-label">Admin Notes</div>
        <textarea class="modal-notes" id="modalNotes" placeholder="Internal notes about this submission..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeSubmissionModal()">Cancel</button>
      <button class="btn-save" id="modalSaveBtn" onclick="saveSubmissionStatus()">Save Changes</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="admin-toast" id="adminToast"></div>

<!-- ── Scripts ──────────────────────────────────────────── -->
<script type="module">
import { initAuth, signInEmail, signInGoogle, signOut } from "./js/admin-auth.js";
import { loadSiteContent } from "/js/firebase-config.js";
import { DEFAULT_CONTENT } from "/js/content-defaults.js";
import { initDashboard, initSubmissionsPanel, startLiveFeed, stopLiveFeed } from "./js/admin-dashboard.js";
import { initContentEditor } from "./js/admin-content.js";
import { initServicesEditor } from "./js/admin-services.js";
import { initSettingsPanel } from "./js/admin-settings.js";
import { showToast, showAdminPanel, setActiveNav, clearDirty, isDirty,
         confirmDiscard, initMobileSidebar } from "./js/admin-ui.js";

// ── State ─────────────────────────────────────────────────
let siteContent  = null;
let currentPanel = "dashboard";
let panelInited  = {};

// ── Auth ──────────────────────────────────────────────────
initAuth(onAuthed, onUnauthed);

async function onAuthed(user) {
  document.getElementById("loginScreen").style.display  = "none";
  const shell = document.getElementById("adminShell");
  shell.classList.add("visible");

  // Set user info in sidebar
  const name  = user.displayName || user.email?.split("@")[0] || "Admin";
  const email = user.email || "";
  document.getElementById("userName").textContent  = name;
  document.getElementById("userEmail").textContent = email;
  document.getElementById("userAvatar").textContent = name.charAt(0).toUpperCase();

  // Load content
  try {
    const remote = await loadSiteContent();
    siteContent = remote ? deepMerge(DEFAULT_CONTENT, remote) : DEFAULT_CONTENT;
  } catch {
    siteContent = DEFAULT_CONTENT;
  }

  // Init
  initMobileSidebar();
  initDashboard();
  startLiveFeed();
  showAdminPanel("dashboard");
}

function onUnauthed() {
  document.getElementById("loginScreen").style.display = "flex";
  document.getElementById("adminShell").classList.remove("visible");
  stopLiveFeed();
  panelInited = {};
}

// ── Login handlers ────────────────────────────────────────
window.handleEmailLogin = async function() {
  const email    = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const btn      = document.getElementById("emailLoginBtn");
  const errEl    = document.getElementById("loginError");
  errEl.classList.remove("show");
  btn.disabled   = true;
  btn.textContent = "Signing in...";
  try {
    await signInEmail(email, password);
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add("show");
  } finally {
    btn.disabled    = false;
    btn.textContent = "Sign In";
  }
};

window.handleGoogleLogin = async function() {
  const btn  = document.getElementById("googleLoginBtn");
  const errEl= document.getElementById("loginError");
  errEl.classList.remove("show");
  btn.disabled = true;
  try {
    await signInGoogle();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.add("show");
  } finally {
    btn.disabled = false;
  }
};

window.handleLogout = async function() {
  await signOut();
};

// ── Panel switching ───────────────────────────────────────
window.switchPanel = function(panelId) {
  if (isDirty() && !confirmDiscard()) return;
  clearDirty();
  currentPanel = panelId;
  showAdminPanel(panelId);

  if (!panelInited[panelId]) {
    panelInited[panelId] = true;
    switch (panelId) {
      case "submissions":
        initSubmissionsPanel();
        break;
      case "content":
        initContentEditor(siteContent);
        break;
      case "services":
        initServicesEditor(siteContent);
        break;
      case "branding":
        initSettingsPanel(siteContent);
        break;
    }
  }

  // Close mobile sidebar
  document.getElementById("adminSidebar")?.classList.remove("mobile-open");
  const ov = document.getElementById("sidebarOverlay");
  if (ov) ov.style.display = "none";
};

// ── Save bar trigger ──────────────────────────────────────
window.triggerActiveSave = function() {
  switch (currentPanel) {
    case "content":    window.saveContentEditor?.();    break;
    case "services":   window.saveServicesEditor?.();   break;
    case "branding":   window.saveBrandingSettings?.(); break;
  }
};

window.handleDiscard = function() {
  if (confirmDiscard()) {
    clearDirty();
    // Re-init current panel
    panelInited[currentPanel] = false;
    window.switchPanel(currentPanel);
  }
};

// ── Modal overlay click ───────────────────────────────────
window.handleModalOverlayClick = function(e) {
  if (e.target.id === "submissionModal") window.closeSubmissionModal();
};

// ── Deep merge ────────────────────────────────────────────
function deepMerge(defaults, overrides) {
  const out = { ...defaults };
  for (const key in overrides) {
    if (overrides[key] && typeof overrides[key] === "object" && !Array.isArray(overrides[key])) {
      out[key] = deepMerge(defaults[key] || {}, overrides[key]);
    } else {
      out[key] = overrides[key];
    }
  }
  return out;
}
</script>
</body>
</html>
