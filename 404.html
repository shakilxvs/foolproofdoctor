<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | FoolProofDoctor</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0b; --gold: #c8a96e; --gold2: #e8c98e;
    --white: #f0ece4; --muted: rgba(240,236,228,0.45);
    --border: rgba(200,169,110,0.18);
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', sans-serif;
  }
  body {
    background: var(--bg); color: var(--white);
    font-family: var(--sans); font-weight: 300;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 40px; overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; opacity: 0.03;
    background-image: linear-gradient(var(--gold) 1px, transparent 1px),
                      linear-gradient(90deg, var(--gold) 1px, transparent 1px);
    background-size: 80px 80px; pointer-events: none;
  }
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(200,169,110,0.06), transparent);
  }
  .content { position: relative; z-index: 2; max-width: 600px; }
  .num {
    font-family: var(--serif); font-size: clamp(120px, 20vw, 200px);
    font-weight: 300; line-height: 1; color: transparent;
    -webkit-text-stroke: 1px rgba(200,169,110,0.3);
    letter-spacing: -0.02em;
    animation: fadeIn 1s ease both;
  }
  .title {
    font-family: var(--serif); font-size: clamp(28px, 4vw, 42px);
    font-weight: 300; margin: 8px 0 20px;
    animation: fadeIn 1s 0.2s ease both;
  }
  .title em { font-style: italic; color: var(--gold); }
  .sub {
    font-size: 15px; color: var(--muted); line-height: 1.8; margin-bottom: 40px;
    animation: fadeIn 1s 0.4s ease both;
  }
  .actions {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    animation: fadeIn 1s 0.6s ease both;
  }
  .btn-primary {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--bg);
    background: var(--gold); border: none;
    padding: 14px 32px; cursor: pointer;
    text-decoration: none; transition: background 0.3s;
  }
  .btn-primary:hover { background: var(--gold2); }
  .btn-ghost {
    font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    background: transparent; border: 1px solid var(--border);
    padding: 13px 32px; cursor: pointer;
    text-decoration: none; transition: all 0.3s;
  }
  .btn-ghost:hover { color: var(--gold); border-color: var(--gold); }
  .logo {
    font-family: var(--serif); font-size: 20px; font-weight: 600;
    margin-bottom: 48px; display: block; text-decoration: none; color: var(--white);
  }
  .logo span { color: var(--gold); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="content">
  <a href="/" class="logo">FoolProof<span>Doctor</span></a>
  <div class="num">404</div>
  <h1 class="title">This page <em>doesn't exist</em></h1>
  <p class="sub">The page you're looking for may have been moved, renamed, or never existed. Let's get you back on track.</p>
  <div class="actions">
    <a href="/" class="btn-primary">Back to Home</a>
    <a href="/#services" class="btn-ghost">View Our Services</a>
  </div>
</div>
</body>
</html>
